<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aary Satardekar — Full-Stack Developer & Systems Engineer. Portfolio of projects, experience, achievements, and coding profiles."
    />
    <meta name="theme-color" content="#f7f5f0" />
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("theme");
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = savedTheme ? savedTheme === "dark" : prefersDark;
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        } catch (error) {
          // Ignore storage access errors and fall back to the stylesheet default.
        }
      })();
    </script>
    <title>Aary Satardekar — Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
